name: Deploy to HQ10 (FTP)

# Автодеплой на хостинг при кожному push у main.
# Копіює файли по FTP — /config/config.php, /public/uploads і сам git
# НЕ чіпаються (лишаються такими, як є на сервері).
on:
  push:
    branches: [main]
  workflow_dispatch: {} # можливість запустити вручну з вкладки Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            config/config.php
            public/uploads/**
            tmp/**
            .vs/**
            db/seed.sql
